[os]
disabled = true
#style = "bg:surface0 fg:text"

[custom.giturl]
# disabled = true
description = "Display symbol for remote Git server"
command = """
GIT_REMOTE=$(command git ls-remote --get-url 2> /dev/null)
if [[ "$GIT_REMOTE" =~ "github" ]]; then
    GIT_REMOTE_SYMBOL="пҗҲ "
elif [[ "$GIT_REMOTE" =~ "gitlab" ]]; then
    GIT_REMOTE_SYMBOL="пҠ– "
elif [[ "$GIT_REMOTE" =~ "bitbucket" ]]; then
    GIT_REMOTE_SYMBOL="п…ұ "
elif [[ "$GIT_REMOTE" =~ "git" ]]; then
    GIT_REMOTE_SYMBOL="пһЎ "
else
    GIT_REMOTE_SYMBOL="пҮ’ "
fi
echo "$GIT_REMOTE_SYMBOL "
"""
when = 'git rev-parse --is-inside-work-tree 2> /dev/null'
format = "at $output"

[git_branch]
symbol = "[оӮ¶](black)пҗҳ "
# format =  ' [$symbol$branch(:$remote_branch)]($style)[оӮҙ]'
style = "fg:lavender bg:black"
format =  '  on [$symbol$branch]($style)[оӮҙ](black)'

[git_status]
format = ' [($all_status$ahead_behind )]($style)'

[nodejs]
symbol = "оңҳ"
format = '[ $symbol( $version) ]($style)'

[c]
symbol = "оҳһ "
format = '[[ $symbol( $version) ]]($style)'

[rust]
symbol = "оһЁ"
format = '[[ $symbol( $version) ]]($style)'

[golang]
symbol = "оҳ§"
format = '[ $symbol( $version) ]($style)'
detect_files = ["go.mod"]

[php]
symbol = "оҳҲ"
format = '[[ $symbol( $version) ]]($style)'

[java]
symbol = "оү– "
format = '[[ $symbol( $version) ]]($style)'

[kotlin]
symbol = "оҳҙ"

format = '[[ $symbol( $version) ]]($style)'

[haskell]
symbol = "оҳҹ"

format = '[[ $symbol( $version) ]]($style)'

[python]
format = '[${symbol}${version}]($style)'
symbol = "рҹҗҚ "
style = "yellow bold"
# Specify the python binary path
python_binary = ["python3", "python"]
# Add .venv directory to detection
detect_folders = [".venv", ".uv"]

[docker_context]
symbol = "пҢҲ"
format = '[ $symbol( $context) ]($style)'


[time]
disabled = true
time_format = "%R"
style = "bg:peach"
format = '[[ пҗә $time ](fg:mantle bg:foam)]($style)'

[line_break]
disabled = true

[character]
disabled = false
success_symbol = '[рқҳ№](bold fg:green)'
error_symbol = '[рқҳ№](bold fg:red)'
vimcmd_symbol = '[пҗҙ](bold fg:creen)'
vimcmd_replace_one_symbol = '[пҗҙ](bold fg:purple)'
vimcmd_replace_symbol = '[пҗҙ](bold fg:purple)'
vimcmd_visual_symbol = '[пҗҙ](bold fg:lavender)'

