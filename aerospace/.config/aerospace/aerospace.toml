# Use Alt/Option as the modifier key (similar to i3's default)
mod = "alt"

# Workspace switching (i3-like)
bind = "mod+1" = "workspace 1"
bind = "mod+2" = "workspace 2"
bind = "mod+3" = "workspace 3"
bind = "mod+4" = "workspace 4"
bind = "mod+5" = "workspace 5"
bind = "mod+6" = "workspace 6"
bind = "mod+7" = "workspace 7"
bind = "mod+8" = "workspace 8"
bind = "mod+9" = "workspace 9"

# Move windows to workspaces (i3-like)
bind = "mod+shift+1" = "move-node-to-workspace 1"
bind = "mod+shift+2" = "move-node-to-workspace 2"
bind = "mod+shift+3" = "move-node-to-workspace 3"
bind = "mod+shift+4" = "move-node-to-workspace 4"
bind = "mod+shift+5" = "move-node-to-workspace 5"
bind = "mod+shift+6" = "move-node-to-workspace 6"
bind = "mod+shift+7" = "move-node-to-workspace 7"
bind = "mod+shift+8" = "move-node-to-workspace 8"
bind = "mod+shift+9" = "move-node-to-workspace 9"

# Basic window management (i3-like)
bind = "mod+shift+q" = "close"
bind = "mod+f" = "toggle-fullscreen"
bind = "mod+v" = "layout vertical"
bind = "mod+h" = "layout horizontal"
bind = "mod+space" = "layout float"

# Focus movement (i3-like)
bind = "mod+left" = "focus left"
bind = "mod+right" = "focus right"
bind = "mod+up" = "focus up"
bind = "mod+down" = "focus down"

# vim-style focus movement
bind = "mod+h" = "focus left"
bind = "mod+l" = "focus right"
bind = "mod+k" = "focus up"
bind = "mod+j" = "focus down"

# Move windows (i3-like)
bind = "mod+shift+left" = "move left"
bind = "mod+shift+right" = "move right"
bind = "mod+shift+up" = "move up"
bind = "mod+shift+down" = "move down"

# vim-style window movement
bind = "mod+shift+h" = "move left"
bind = "mod+shift+l" = "move right"
bind = "mod+shift+k" = "move up"
bind = "mod+shift+j" = "move down"

# Launch terminal (adjust the terminal app as needed)
bind = "mod+return" = "exec open -a 'Ghostty'"

# Reload config
bind = "mod+shift+r" = "reload-config"

# Layout settings
default-layout = "main-vertical"
main-ratio = 0.5
main-count = 1

# Gaps and borders (i3-like)
gaps.inner = 10
gaps.outer = 5
