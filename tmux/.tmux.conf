

set -ga terminal-overrides ",screen-256color*:Tc"
set-option -g default-terminal "screen-256color"
set -s escape-time 0
# action key
unbind C-b
set-option -g prefix C-a
set-option -g repeat-time 100
set-option -g focus-events on
set -g base-index 1

#### Key bindings

set-window-option -g mode-keys vi

#bind t send-key C-t
# Reload settings
bind-key -r G run-shell "path-to-harpoon/harpoon/scripts/tmux/switch-back-to-nvim"
bind r source-file ~/.tmux.conf
bind -r D neww -c "#{pane_current_path}" "[[ -e PARKING_LOT.md ]] && nvim PARKING_LOT.md || nvim ~/.dotfiles/personal/PARKING_LOT.md"
bind-key -r f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"
# Open current directory
bind o run-shell "open #{pane_current_path}"
# vim-like pane switching
bind -r k select-pane -U 
bind -r j select-pane -D 
bind -r h select-pane -L 
bind -r l select-pane -R 

# Moving window
bind-key -n C-S-Left swap-window -t -1 \; previous-window
bind-key -n C-S-Right swap-window -t +1 \; next-window

# Smart pane switching with awareness of vim splits (from christoomey/vim-tmux-navigator)
is_vim='echo "#{pane_current_command}" | grep -iqE "(^|\/)g?(view|n?vim?)(diff)?$"'
bind-key -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind-key -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind-key -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind-key -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

# Resizing pane
bind-key -r C-k resize-pane -U 10
bind-key -r C-j resize-pane -D 10
bind-key -r C-h resize-pane -L 10
bind-key -r C-l resize-pane -R 10

#### basic settings
set-option -g history-limit 64096
set -g window-style fg=colour10,bg=default
set -g window-active-style fg=colour12,bg=default

