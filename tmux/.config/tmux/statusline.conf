set -g mode-style "fg=#e0def4,bg=#16141f"

set -g message-style "fg=#e0def4,bg=#16141f"
set -g message-command-style "fg=#e0def4,bg=#16141f"

set -g pane-border-style "fg=#16141f"
set -g pane-active-border-style "fg=#e0def4"

set -g status "on"
set -g status-interval 1
set -g status-justify "left"

set -g status-style "fg=#908caa,bg=#16141f"

set -g status-bg "#1f1d2e"

set -g status-left-length "100"
set -g status-right-length "100"

set -g status-left-style NONE
set -g status-right-style NONE

set -g status-left "#[fg=#16141f,bg=#e0def4,bold] #S #[fg=#e0def4,bg=#26233a,nobold,nounderscore,noitalics]#[fg=#eb6f92,bg=#26233a,bold] #(whoami) #[fg=#26233a,bg=#1f1d2e]"
set -g status-right "#[fg=#908caa,bg=#1f1d2e,nobold,nounderscore,noitalics]#[fg=#26233a,bg=#908caa]#[fg=#6e6a86,bg=#908caa,nobold,nounderscore,noitalics]#[fg=#908caa,bg=#6e6a86]#[fg=#908caa,bg=#6e6a86,nobold,nounderscore,noitalics]#[fg=#eb6f92,bg=#26233a,bold] #h "

setw -g window-status-activity-style "underscore,fg=#908caa,bg=#1f1d2e"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#908caa,bg=#1f1d2e"
setw -g window-status-format '#[fg=#1f1d2e,bg=#1f1d2e]#[default] #I  #{b:pane_current_path} #[fg=#1f1d2e,bg=#1f1d2e,nobold,nounderscore,noitalics]'
setw -g window-status-current-format '#[fg=#1f1d2e,bg=#e0def4]#[fg=#16141f,bg=#e0def4] #I #[fg=#16141f,bg=#f6c177] #{b:pane_current_path} #[fg=#f6c177,bg=#1f1d2e,nobold]'
