# Catppuccino theme scheme for Alacritty

[colors.normal]
black = "#262626"
magenta = "#ff7eb6"
green = "#42be65"
yellow = "#ffe97b"
blue = "#33b1ff"
red = "#ee5396"
cyan = "#3ddbd9"
white = "#dde1e6"

[colors.bright]
black = "#393939"
magenta = "#ff7eb6"
green = "#42be65"
yellow = "#ffe97b"
blue = "#33b1ff"
red = "#ee5396"
cyan = "#3ddbd9"
white = "#ffffff"


[general]
live_config_reload = true

[terminal.shell]
program = "/usr/local/bin/zsh"

[window]
blur = true
opacity = 0.94
padding.x = 4
padding.y = 0
option_as_alt = 'Both'
dimensions.columns = 90
dimensions.lines = 25
decorations = "Full"
decorations_theme_variant = "Light" # "Dark"

[font]
normal.family = "MesloLGS NF"
bold.family = "MesloLGS NF"
italic.family = "MesloLGS NF"
bold_italic.family = "MesloLGS NF"
size = 11.0

[cursor]
style = "Block"
vi_mode_style = "Block"
unfocused_hollow =true
