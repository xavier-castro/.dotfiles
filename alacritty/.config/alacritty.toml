# Catppuccino theme scheme for Alacritty

[colors.primary]
background = '#1E1E2E'
foreground = '#D6D6D6'

[colors.cursor]
text = '#1E1E2E'
cursor = '#D9D9D9'

[colors.normal]
black = '#181A1F'
red = '#E86671'
green = '#98C379'
yellow = '#E5C07B'
blue = '#61AFEF'
magenta = '#C678DD'
cyan = '#54AFBC'
white = '#ABB2BF'

[colors.bright]
black = '#5C6370'
red = '#E86671'
green = '#98C379'
yellow = '#E5C07B'
blue = '#61AFEF'
magenta = '#C678DD'
cyan = '#54AFBC'
white = '#F7F7F7'

[colors.dim]
black = '#5C6370'
red = '#74423F'
green = '#98C379'
yellow = '#E5C07B'
blue = '#61AFEF'
magenta = '#6E4962'
cyan = '#5C8482'
white = '#828282'

[general]
live_config_reload = true

[terminal.shell]
program = "/usr/local/bin/zsh"

[window]
blur = true
opacity = 0.94
padding.x = 4
padding.y = 0
option_as_alt = 'Both'
dimensions.columns = 90
dimensions.lines = 25
decorations = "Full"
decorations_theme_variant = "Light" # "Dark"

[font]
normal.family = "MesloLGS NF"
bold.family = "MesloLGS NF"
italic.family = "MesloLGS NF"
bold_italic.family = "MesloLGS NF"
size = 11.0

[cursor]
style = "Block"
vi_mode_style = "Block"
unfocused_hollow =true
